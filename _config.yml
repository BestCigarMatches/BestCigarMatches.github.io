# Best Cigar Matches — _config.yml
# Restart `bundle exec jekyll serve` after any change to this file.

# Site identity
title: Best Cigar Matches
product: Best Cigar Matches
tag-line: "Long-form cigar matches and leather goods, made by hand."
description: "Best Cigar Matches makes 4-inch hand-finished cedar matches and hand-cut leather cases for cigar smokers who want a real light and a place to put it."
email: hello@bestcigarmatches.com   # update if a different inbox should receive contact-form copies
webmaster: Aaron Aiken
webmaster-url: https://aaronaiken.me/
url: "https://bestcigarmatches.com"
baseurl: ""

# Analytics — Tinylytics only.
tinylytics: https://tinylytics.app/embed/XDNFNjsuCVkLQZtRrDQq.js?hits&kudos&countries&uptime

# Image alt text (logo image fields removed — using text-based identity, not image)
img-alt: Best Cigar Matches

# Video — paste Bunny.net or other embed src URL. Section on the homepage
# auto-hides when empty.
main-video:

# Homepage featured products — SKU list, order preserved. OOS SKUs in this
# list are silently skipped. Drop a SKU from the list to remove from the
# homepage without touching the product's own front matter.
homepage_featured:
  - BCM-M-050
  - BCM-CC-03-LE
  - BCM-CC-03-SS

# Homepage "Story / The bench" section. Section auto-hides the prose+image
# block when story_headline is empty — the craft callouts still render below.
story_headline: from a small workshop in Harrisburg, Pennsylvania
story_paragraph: A cigar deserves a proper light. Standard cigar matches snap most times and a cigar requires 4 or so to get it right. Our matches are 4 inches long, three times thicker than standard, and only one is required to light your cigar. Each one is hand-carved with Aaron's favorite Slojd knife. Our leather goods receive the same slow treatment — cut, assembled, and stitched by hand. Previously under the brand name of A. M. Aiken, now a quieter operation. Aaron makes the stuff, Lindsay picks/packs/ships, answers emails, and keeps things running smoothly.
bench_image: https://bcm-media.b-cdn.net/aaron-at-the-bench.jpg
bench_image_alt: Aaron at the bench

# Stripe — payment processing
# stripe_publishable_key: public key, safe to be in HTML. Never put secret key here.
# stripe_enabled: controls whether Stripe.js loads site-wide.
#
# This file is the PRODUCTION config. Local dev uses an additional _config.dev.yml
# (gitignored) that overrides stripe_publishable_key with a pk_test_* key, run via:
#   bundle exec jekyll serve --config _config.yml,_config.dev.yml
# When switching to Stripe live mode, change stripe_publishable_key below to the
# pk_live_* value, and ensure _config.dev.yml still holds the pk_test_* override.
stripe_publishable_key: "pk_live_51TLhwY4ici8Ctjd2WlR52haDPukheIVe9OfRCPaqOBPDpkjfMbvoobic2b1tVo5L93hewS3VQb3OyTgZshVVrNXv00ajSlPSjP"
stripe_enabled: true

# Flask backend API base URL
# Change to live URL when PythonAnywhere app is confirmed at that address.
api_url: "https://admin.bestcigarmatches.com"

# Collections
collections:
  products:
    sort_by: name
    output: true
    permalink: /shop/:name/
  pages:
    output: true
    permalink: /:name/

# Front matter defaults
defaults:
  - scope:
      path: "_products"
      type: "products"
    values:
      layout: product
      in_stock: false
      exclusive: false

# Build settings — no theme, fully custom layouts
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from build
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - decisions.md
  - borrowed-from-the-falcon.md
  - bcmgithubissues.csv
