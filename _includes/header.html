<header class="site-header" role="banner">
  <div class="container header__inner">

    <a class="site-logo" href="{{ site.url }}/" aria-label="{{ site.product }} — home">
      <img
        src="{{ '/assets/img/logos/bcmLogo-400.png' | relative_url }}"
        alt="{{ site.product }}"
        height="52"
        width="auto"
      >
    </a>

    <button class="cart-icon" id="cart-toggle" aria-label="Open cart" aria-expanded="false">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      <span class="cart-icon__count" id="cart-count" aria-live="polite">0</span>
    </button>

  </div>
</header>
