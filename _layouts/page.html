<!doctype html>
<html lang="en">
  {% include head.html %}
  <body>

	{% include header.html %}

	<main class="container" id="main-content">

	  {% include nav.html %}

	  <article class="section">
		{%- if page.title -%}
		  <header class="post-header">
			<h1 class="post-title">{{ page.title }}</h1>

		<div class="post-content">
		  {{ content }}

	  </article>

	</main>

	{% include footer.html %}
	{% include buttonjs.html %}

  </body>
</html>
