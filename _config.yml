# Best Cigar Matches — _config.yml
# Restart `bundle exec jekyll serve` after any change to this file.

# Site identity
title: Best Cigar Matches
product: Best Cigar Matches
tag-line: "Long-form cigar matches and leather goods, made by hand."
description: "Best Cigar Matches makes 4-inch hand-finished cedar matches and hand-cut leather cases for cigar smokers who want a real light and a place to put it."
email: hello@bestcigarmatches.com   # update if a different inbox should receive contact-form copies
webmaster: Aaron Aiken
webmaster-url: https://aaronaiken.me/
url: "https://bestcigarmatches.com"
baseurl: ""

# Analytics — Tinylytics only.
# Paste full embed URL when activating.
# Example: https://tinylytics.app/embed/YOURCODE.js?hits&kudos&countries&uptime
tinylytics:

# Image alt text (logo image fields removed — using text-based identity, not image)
img-alt: Best Cigar Matches

# Video — paste Bunny.net or other embed src URL
main-video:

# Stripe — payment processing
# stripe_publishable_key: public key, safe to be in HTML. Never put secret key here.
# stripe_enabled: controls whether Stripe.js loads site-wide.
#
# This file is the PRODUCTION config. Local dev uses an additional _config.dev.yml
# (gitignored) that overrides stripe_publishable_key with a pk_test_* key, run via:
#   bundle exec jekyll serve --config _config.yml,_config.dev.yml
# When switching to Stripe live mode, change stripe_publishable_key below to the
# pk_live_* value, and ensure _config.dev.yml still holds the pk_test_* override.
stripe_publishable_key: "pk_test_51TLhwn8DbHbx2eMbnOo7E3P5f4vVnhJTL7QpvFZbIQiniUAF2HPFlSRcPDijzrmnwyfum7DYiwglm3pXWCGxM0qM00RF08zpEh"
stripe_enabled: true

# Flask backend API base URL
# Change to live URL when PythonAnywhere app is confirmed at that address.
api_url: "https://admin.bestcigarmatches.com"

# Collections
collections:
  products:
    sort_by: name
    output: true
    permalink: /shop/:name/
  pages:
    output: true
    permalink: /:name/

# Front matter defaults
defaults:
  - scope:
      path: "_products"
      type: "products"
    values:
      layout: product
      in_stock: false
      exclusive: false

# Build settings — no theme, fully custom layouts
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from build
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - decisions.md
  - borrowed-from-the-falcon.md
  - bcmgithubissues.csv
