<h2>{{ site.product }} — Video Walkthrough</h2>

{%- if site.main-video -%}
  <div class="video-wrapper">
	<iframe
	  src="{{ site.main-video }}"
	  loading="lazy"
	  allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture"
	  allowfullscreen="true"
	  title="{{ site.product }} video walkthrough"
	></iframe>
  </div>
{%- else -%}
  <p class="text-muted"><em>Video coming soon.</em></p>
{%- endif -%}
